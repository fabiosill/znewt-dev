<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zNewtDev — CSS</title>
  <link rel="icon" href="../znewtdev.png"/>  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #03050e;
      --surface: #070b18;
      --s2:      #0d1530;
      --border:  rgba(61,158,255,0.13);
      --cyan:    #00d4ff;
      --white:   #eef4ff;
      --muted:   #4d6490;
      --accent:  #a855f7; /* roxo para CSS */
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--white);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; line-height: 1.6; min-height: 100vh;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(3,5,14,0.9); backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      height: 52px; display: flex; align-items: center;
      padding: 0 1.75rem; gap: 0.85rem;
    }
    .logo { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 1rem; color: var(--white); }
    .logo span { color: var(--cyan); }
    .sep { width: 1px; height: 18px; background: var(--border); }
    .crumb { font-size: 0.8rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
    .crumb .cur { color: var(--accent); font-weight: 600; }
    .back {
      margin-left: auto; font-size: 0.78rem; font-weight: 600;
      text-decoration: none; padding: 0.35rem 0.9rem; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; box-shadow: 0 4px 14px rgba(168,85,247,0.3);
      transition: all 0.18s;
    }
    .back:hover { box-shadow: 0 6px 22px rgba(168,85,247,0.5); transform: translateY(-1px); }

    /* ── Page ── */
    .page { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }

    .course-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem); font-weight: 800;
      letter-spacing: -0.03em; line-height: 1; margin-bottom: 0.5rem;
    }
    .course-title span { color: var(--accent); }
    .course-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 2rem; }

    .now-playing {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--accent);
      display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.5rem;
    }
    .now-playing::before {
      content: ''; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px var(--accent);
    }
    .now-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(1rem, 3vw, 1.4rem); font-weight: 700;
      color: var(--white); letter-spacing: -0.02em; margin-bottom: 1.25rem; line-height: 1.3;
    }

    .player {
      border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      margin-bottom: 1.5rem;
    }
    .player-ratio { position: relative; width: 100%; padding-top: 56.25%; }
    .player-ratio iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    .nav-row { display: flex; gap: 0.75rem; margin-bottom: 3rem; }
    .btn {
      flex: 1; padding: 0.6rem 1.1rem; border-radius: 10px;
      font-size: 0.83rem; font-weight: 600; cursor: pointer; border: none;
      transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-prev { background: var(--s2); color: var(--muted); border: 1px solid var(--border); }
    .btn-prev:hover:not(:disabled) { color: var(--white); border-color: rgba(61,158,255,0.3); }
    .btn-prev:disabled { opacity: 0.3; cursor: default; }
    .btn-next {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff; box-shadow: 0 4px 18px rgba(168,85,247,0.3);
    }
    .btn-next:hover:not(:disabled) { box-shadow: 0 6px 26px rgba(168,85,247,0.5); transform: translateY(-1px); }
    .btn-next:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

    .sec-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
    }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .list { display: flex; flex-direction: column; gap: 0.6rem; }

    .card {
      display: flex; align-items: center; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 12px; padding: 0.85rem 1rem;
      cursor: pointer; transition: all 0.15s;
    }
    .card:hover { background: var(--s2); border-color: rgba(61,158,255,0.25); transform: translateX(3px); }
    .card.active { background: rgba(168,85,247,0.06); border-color: rgba(168,85,247,0.25); border-left-color: var(--accent); }
    .card.done .num { background: rgba(34,197,94,0.13); border-color: rgba(34,197,94,0.3); color: #22c55e; }

    .thumb {
      flex-shrink: 0; width: 88px; height: 52px;
      border-radius: 8px; background: var(--s2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; position: relative; overflow: hidden;
    }
    .thumb-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .thumb-overlay svg { width: 20px; height: 20px; fill: #fff; }
    .card:hover .thumb-overlay { opacity: 1; }
    .card.active .thumb { border-color: rgba(168,85,247,0.35); }

    .info { flex: 1; min-width: 0; }
    .info-top { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.2rem; }
    .num {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      background: var(--s2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.6rem; font-weight: 700; color: var(--muted);
    }
    .card.active .num { background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.35); color: var(--accent); }
    .info-aula { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .card.active .info-aula { color: var(--accent); }

    .name {
      font-size: 0.86rem; font-weight: 600; color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.25rem;
    }
    .desc { font-size: 0.76rem; color: var(--muted); line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

    .meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
    .dur { font-size: 0.68rem; color: var(--muted); }
    .badge-free {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      padding: 0.06rem 0.4rem; border-radius: 99px;
      background: rgba(0,212,255,0.1); color: var(--cyan); border: 1px solid rgba(0,212,255,0.22);
    }

    @media (max-width: 520px) {
      .page { padding: 1.5rem 1rem 4rem; }
      .thumb { width: 64px; height: 40px; font-size: 1.1rem; }
      .course-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="logo">zNewt<span>Dev</span></div>
  <div class="sep"></div>
  <div class="crumb"><span>Cursos</span><span>›</span><span class="cur">CSS</span></div>
  <a href="../../index.html" class="back">Início</a>
</header>

<div class="page">

  <div class="course-title">CSS<span>.</span></div>
  <div class="course-sub">9 aulas · Iniciante ao Avançado · Estilização</div>

  <div class="now-playing" id="nowPlaying">Aula 1 em exibição</div>
  <div class="now-title" id="nowTitle">Introdução ao CSS — Estilizando a Web</div>

  <div class="player">
    <div class="player-ratio">
      <iframe id="player"
        src="https://www.youtube.com/embed/yfoY53QXEnI?rel=0&modestbranding=1"
        title="Aula CSS" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
      </iframe>
    </div>
  </div>

  <div class="nav-row">
    <button class="btn btn-prev" id="prevBtn" onclick="nav(-1)" disabled>← Anterior</button>
    <button class="btn btn-next" id="nextBtn" onclick="nav(1)">Próxima Aula →</button>
  </div>

  <div class="sec-label">Aulas do curso</div>
  <div class="list" id="list"></div>

</div>

<script>
const LESSONS = [
  { id:1, name:'Introdução ao CSS',              desc:'O que é CSS, como vincular ao HTML, cascata, herança e especificidade.', dur:'18:10', vid:'yfoY53QXEnI', emoji:'🎨', free:true  },
  { id:2, name:'Seletores e Especificidade',     desc:'Seletores de tag, classe, ID, pseudo-classes e como o peso é calculado.', dur:'14:30', vid:'yfoY53QXEnI', emoji:'🎯', free:true  },
  { id:3, name:'Box Model na Prática',           desc:'margin, padding, border, width e o impacto de box-sizing: border-box.', dur:'16:00', vid:'yfoY53QXEnI', emoji:'📦', free:false },
  { id:4, name:'Flexbox Completo',               desc:'display:flex, justify-content, align-items, flex-wrap e casos reais de uso.', dur:'22:15', vid:'yfoY53QXEnI', emoji:'↔️', free:false },
  { id:5, name:'CSS Grid do Zero',               desc:'grid-template, fr, areas, auto-fill e criação de layouts complexos.', dur:'24:00', vid:'yfoY53QXEnI', emoji:'🔲', free:false },
  { id:6, name:'Responsividade e Media Queries', desc:'Mobile-first, breakpoints, unidades relativas e viewport.', dur:'18:45', vid:'yfoY53QXEnI', emoji:'📱', free:false },
  { id:7, name:'Animações e Transições',         desc:'transition, @keyframes, animation e timing functions.', dur:'20:00', vid:'yfoY53QXEnI', emoji:'✨', free:false },
  { id:8, name:'Variáveis CSS e Temas',          desc:'Custom Properties, :root, temas claro/escuro e design tokens.', dur:'12:30', vid:'yfoY53QXEnI', emoji:'🎛️', free:false },
  { id:9, name:'Projeto Final — Landing Page',   desc:'Landing page responsiva e animada do zero com tudo do curso.', dur:'30:00', vid:'yfoY53QXEnI', emoji:'🚀', free:false },
];

let cur = 1;
const done = new Set();

function render() {
  const l = LESSONS.find(x => x.id === cur);
  document.getElementById('nowPlaying').textContent = `Aula ${l.id} em exibição`;
  document.getElementById('nowTitle').textContent   = l.name;
  document.getElementById('prevBtn').disabled       = cur === 1;
  document.getElementById('nextBtn').disabled       = cur === LESSONS.length;

  const list = document.getElementById('list');
  list.innerHTML = '';
  LESSONS.forEach(l => {
    const d = document.createElement('div');
    d.className = 'card' + (l.id === cur ? ' active' : '') + (done.has(l.id) ? ' done' : '');
    d.innerHTML = `
      <div class="thumb">
        <span>${l.emoji}</span>
        <div class="thumb-overlay"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="info">
        <div class="info-top">
          <div class="num">${done.has(l.id) ? '✓' : l.id}</div>
          <span class="info-aula">Aula ${l.id}</span>
        </div>
        <div class="name">${l.name}</div>
        <div class="desc">${l.desc}</div>
        <div class="meta">
          <span class="dur">▶ ${l.dur}</span>
          ${l.free ? '<span class="badge-free">Grátis</span>' : ''}
        </div>
      </div>`;
    d.addEventListener('click', () => goTo(l.id));
    list.appendChild(d);
  });
}

function goTo(id) {
  done.add(cur);
  cur = id;
  const l = LESSONS.find(x => x.id === id);
  document.getElementById('player').src = `https://www.youtube.com/embed/${l.vid}?rel=0&modestbranding=1&autoplay=1`;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nav(dir) {
  const newId = cur + dir;
  if (newId >= 1 && newId <= LESSONS.length) goTo(newId);
}

render();
</script>
</body>
</html>
